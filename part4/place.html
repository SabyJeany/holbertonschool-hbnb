<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Details</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="icon.png" type="image/png">
</head>
<body>
    <header>
        <div class="header-container">
            <img src="logo.png" alt="HBnB Logo" class="logo">
            <nav>
                <a href="index.html" class="login-button">Home</a>
            </nav>
        </div>
    </header>

    <main>
        <section id="place-details" class="place-details">
            <div class="place-info">
                <!-- Place details will be populated dynamically -->
            </div>
        </section>

        <section id="reviews">
            <h2>Reviews</h2>
            <!-- Each review will look like this :
            <div class="review-card">
                <p>Comment</p>
                <p>User Name</p>
                <p>Rating: 5</p>
            </div>
            -->
        </section>

        <section id="add-review">
            <h2>Add a Review</h2>
            <form id="review-form" class="add-review form">
                <label for="review-text">Review:</label>
                <textarea id="review-text" name="review-text" required></textarea>
                
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2024 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
